name: ⚛️ Deploy Martinez-Vetconnect to VPS (Nginx) - VetConnect

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 🌟 ESTO ES NUEVO: Le dice a GitHub que trabaje dentro de tu subcarpeta de React
    defaults:
      run:
        working-directory: vetconnect

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # También le avisa al cache dónde está el package-lock.json
          cache-dependency-path: vetconnect/package-lock.json

      - name: Create env for build
        run: |
          printf "%s" "${{ secrets.REACT_ENV }}" > .env.production

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          # Apunta a la subcarpeta dist
          source: "vetconnect/dist/*"
          target: "/tmp/vetconnect_react_build"
          strip_components: 1

      - name: Activate build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            mkdir -p /opt/martinez-vetconnect/vetconnect/dist
            rm -rf /opt/martinez-vetconnect/vetconnect/dist/*
            
            # Copia directo lo que se subió a la carpeta temporal
            cp -r /tmp/vetconnect_react_build/* /opt/martinez-vetconnect/vetconnect/dist/

            chown -R www-data:www-data /opt/martinez-vetconnect/vetconnect/dist

            nginx -t
            systemctl reload nginx