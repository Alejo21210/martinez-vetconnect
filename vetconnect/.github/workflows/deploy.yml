name: Deploy React to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vetconnect
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vetconnect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "vetconnect/dist/*"
          target: "/tmp/vetconnect_react_build"
          strip_components: 1

      - name: Activate build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e
            mkdir -p /opt/martinez-vetconnect/vetconnect/dist
            rm -rf /opt/martinez-vetconnect/vetconnect/dist/*
            cp -r /tmp/vetconnect_react_build/* /opt/martinez-vetconnect/vetconnect/dist/
            chown -R www-data:www-data /opt/martinez-vetconnect/vetconnect/dist
            nginx -t
            systemctl reload nginx