name: ⚛️ Deploy Martinez Vetconnect to VPS (Nginx) - VetConnect

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create env for build
        run: |
          printf "%s" "${{ secrets.REACT_ENV }}" > .env.production

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "dist/*"
          target: "/tmp/vetconnect_react_build"

      - name: Activate build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            # Asegurar que exista el directorio de despliegue
            mkdir -p /opt/martinez-vetconnect/vetconnect/dist
            
            # Limpiar la versión anterior
            rm -rf /opt/martinez-vetconnect/vetconnect/dist/*
            
            # Mover los nuevos archivos compilados
            cp -r /tmp/vetconnect_react_build/dist/* /opt/martinez-vetconnect/vetconnect/dist/

            # Ajustar permisos para Nginx
            chown -R www-data:www-data /opt/martinez-vetconnect/vetconnect/dist

            # Validar y recargar Nginx
            nginx -t
            systemctl reload nginx